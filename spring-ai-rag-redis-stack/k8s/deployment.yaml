apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-rag-redis
  labels:
    app.kubernetes.io/name: spring-ai-rag-redis
    app.kubernetes.io/part-of: egovframe-ai-rag
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-ai-rag-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-ai-rag-redis
        app.kubernetes.io/part-of: egovframe-ai-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/spring-ai-rag-redis:1.0.0
          image: spring-ai-rag-redis:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: spring-ai-rag-redis
          env:
            # DJL이 네이티브 라이브러리를 user.home/.djl.ai/에 캐시하므로 쓰기 가능한 /tmp로 지정한다.
            # EMBEDDING_MODEL_PATH/EMBEDDING_TOKENIZER_PATH와 분리해 readOnlyRootFilesystem 환경에서도 동작하게 한다.
            - name: JAVA_TOOL_OPTIONS
              value: "-Duser.home=/tmp"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              # ONNX 모델을 외부 PVC에서 로딩하므로 이미지 자체는 가볍다.
              # 런타임에 ONNX 모델 로딩 시 약 1–2GB 메모리가 필요하며,
              # JVM 힙 + 네이티브 메모리 + DJL 토크나이저 버퍼 여유를 고려하여 4Gi로 설정.
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # ONNX 임베딩 모델(model.onnx, tokenizer.json)을 PVC에서 마운트
            # PVC에 사전 적재 필요: kubectl cp <로컬-모델-디렉토리> <pod>:/models/
            - name: models
              mountPath: /models
              readOnly: true
            - name: documents
              mountPath: /workspace/data
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: spring-ai-rag-redis-models
        - name: documents
          emptyDir: {}  # 운영 시 PersistentVolumeClaim으로 교체
